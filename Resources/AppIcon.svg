<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0620"/>
    </linearGradient>

    <!-- Metallic silver gradient for MLX letters -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0f0f5"/>
      <stop offset="18%"  stop-color="#d0cfe8"/>
      <stop offset="40%"  stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#b8b5d8"/>
      <stop offset="75%"  stop-color="#9896c0"/>
      <stop offset="88%"  stop-color="#c8c6e0"/>
      <stop offset="100%" stop-color="#7c7a9e"/>
    </linearGradient>

    <!-- Metallic edge bevel (darker) -->
    <linearGradient id="metalEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a4870"/>
      <stop offset="50%"  stop-color="#2a2848"/>
      <stop offset="100%" stop-color="#1a1830"/>
    </linearGradient>

    <!-- Accent arc gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Chip face gradient -->
    <linearGradient id="chipFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1a3a"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </linearGradient>

    <!-- Engraved M gradient (recessed look) -->
    <linearGradient id="engrave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0820"/>
      <stop offset="60%"  stop-color="#1a1640"/>
      <stop offset="100%" stop-color="#2a2560"/>
    </linearGradient>

    <!-- Subtle text glow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow for arc -->
    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Chip shadow -->
    <filter id="chipShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>

    <!-- Metallic text bevel filter -->
    <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Very subtle scanline texture feel: horizontal rules -->
  <rect width="1024" height="1024" rx="200" ry="200"
        fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="2"/>

  <!-- ── Chip: small, top-center, above the text ── -->
  <!-- Chip body -->
  <rect x="412" y="72" width="200" height="200" rx="30" ry="30"
        fill="url(#chipFace)" stroke="#3b3470" stroke-width="2"
        filter="url(#chipShadow)"/>

  <!-- Chip inner border -->
  <rect x="424" y="84" width="176" height="176" rx="22" ry="22"
        fill="none" stroke="#2d2860" stroke-width="1"/>

  <!-- Chip pins - top -->
  <g stroke="#4c4580" stroke-width="6" stroke-linecap="round">
    <line x1="448" y1="72" x2="448" y2="52"/>
    <line x1="480" y1="72" x2="480" y2="52"/>
    <line x1="512" y1="72" x2="512" y2="52"/>
    <line x1="544" y1="72" x2="544" y2="52"/>
    <line x1="576" y1="72" x2="576" y2="52"/>
    <!-- Bottom -->
    <line x1="448" y1="272" x2="448" y2="292"/>
    <line x1="480" y1="272" x2="480" y2="292"/>
    <line x1="512" y1="272" x2="512" y2="292"/>
    <line x1="544" y1="272" x2="544" y2="292"/>
    <line x1="576" y1="272" x2="576" y2="292"/>
    <!-- Left -->
    <line x1="412" y1="112" x2="392" y2="112"/>
    <line x1="412" y1="144" x2="392" y2="144"/>
    <line x1="412" y1="176" x2="392" y2="176"/>
    <line x1="412" y1="208" x2="392" y2="208"/>
    <line x1="412" y1="240" x2="392" y2="240"/>
    <!-- Right -->
    <line x1="612" y1="112" x2="632" y2="112"/>
    <line x1="612" y1="144" x2="632" y2="144"/>
    <line x1="612" y1="176" x2="632" y2="176"/>
    <line x1="612" y1="208" x2="632" y2="208"/>
    <line x1="612" y1="240" x2="632" y2="240"/>
  </g>

  <!-- Engraved "M" on chip face — the hidden second M (for Manager) -->
  <!-- Block letter M, recessed/engraved style -->
  <text x="512" y="218" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="118" font-weight="900"
        fill="url(#engrave)"
        stroke="#0d0b25" stroke-width="1">M</text>
  <!-- Engraved highlight edge (top-left light catch) -->
  <text x="511" y="217" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="118" font-weight="900"
        fill="none"
        stroke="#4a4580" stroke-width="0.75" opacity="0.6">M</text>

  <!-- ── Progress arc behind MLX text ── -->
  <!-- Track -->
  <path d="M 512 870 A 358 358 0 1 1 511.999 870"
        fill="none" stroke="#ffffff" stroke-opacity="0.05"
        stroke-width="24" stroke-linecap="round"/>
  <!-- Active arc: from ~200° to ~340° (goes around the bottom and sides) -->
  <!-- 200°: 512+358*cos(200°), 512+358*sin(200°) = 176, 634 -->
  <!-- 340°: 512+358*cos(340°), 512+358*sin(340°) = 848, 390 -->
  <path d="M 175 634 A 358 358 0 1 1 848 390"
        fill="none" stroke="url(#arcGrad)"
        stroke-width="24" stroke-linecap="round"
        filter="url(#arcGlow)" opacity="0.85"/>

  <!-- Arc endpoint dots -->
  <circle cx="175" cy="634" r="14" fill="#6366f1" filter="url(#arcGlow)"/>
  <circle cx="848" cy="390" r="14" fill="#38bdf8" filter="url(#arcGlow)"/>

  <!-- ── MLX — large metallic letters, dominating the icon ── -->
  <!-- Shadow/depth layer (offset down-right, dark) -->
  <text x="516" y="730" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="420" font-weight="900" letter-spacing="-8"
        fill="#1a1838" opacity="0.9">MLX</text>

  <!-- Bevel layer (offset up-left, light) -->
  <text x="510" y="726" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="420" font-weight="900" letter-spacing="-8"
        fill="#5a58a0" opacity="0.5">MLX</text>

  <!-- Main metallic face -->
  <text x="512" y="728" text-anchor="middle"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="420" font-weight="900" letter-spacing="-8"
        fill="url(#metal)"
        filter="url(#textGlow)">MLX</text>

  <!-- Subtle horizontal shine streak across letters -->
  <rect x="60" y="560" width="904" height="28" rx="4"
        fill="url(#metal)" opacity="0.08"/>
  <rect x="60" y="595" width="904" height="8" rx="2"
        fill="#ffffff" opacity="0.04"/>
</svg>
